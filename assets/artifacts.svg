      <rect x="200" y="148" width="50" height="16" rx="3"/><text x="206" y="160" fill="#fff">helmet 0.94</text>
      <rect x="290" y="188" width="44" height="16" rx="3"/><text x="296" y="200" fill="#fff">vest 0.91</text>
    </g>
