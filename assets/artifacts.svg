  <symbol id="art-agri" viewBox="0 0 400 400">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient></defs>
    <rect x="20" y="40" width="360" height="320" rx="14" fill="url(#ga)"/>
