    <g opacity=".4" stroke="#334155" stroke-width="1">
      <line x1="40" y1="100" x2="360" y2="100"/><line x1="40" y1="140" x2="360" y2="140"/><line x1="40" y1="180" x2="360" y2="180"/><line x1="40" y1="220" x2="360" y2="220"/><line x1="40" y1="260" x2="360" y2="260"/><line x1="40" y1="300" x2="360" y2="300"/><line x1="40" y1="340" x2="360" y2="340"/>
