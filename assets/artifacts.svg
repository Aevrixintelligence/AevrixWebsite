    <circle cx="350" cy="86" r="5" fill="#ef4444"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
  </symbol>

  <symbol id="art-search" viewBox="0 0 400 400">
    <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00b8a9"/><stop offset="100%" stop-color="#00d4c3"/></linearGradient></defs>
