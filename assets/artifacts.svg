      <path d="M0 12L-40 180M0 12L40 180" stroke="#00b8a9" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>
    </g>
    <text x="40" y="80" fill="#94a3b8" font-family="Inter,sans-serif" font-size="11" font-weight="500">LINE_07 · QC</text>
    <text x="40" y="350" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Inspected 14,206 units · 23 flagged today</text>
