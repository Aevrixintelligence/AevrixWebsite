    <rect x="84" y="98" width="180" height="2" rx="1" fill="#00b8a9"><animate attributeName="width" values="0;180" dur="1.4s" repeatCount="indefinite"/></rect>
    <!-- result thumbnails -->
    <g>
      <rect x="20" y="140" width="170" height="110" rx="10" fill="#0f172a"/>
      <rect x="40" y="170" width="60" height="60" rx="4" fill="url(#g2)" opacity=".55"/>
      <rect x="110" y="180" width="60" height="40" rx="4" fill="#475569"/>
      <text x="30" y="160" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">2024-09-12 · 18:42</text>
      <rect x="210" y="140" width="170" height="110" rx="10" fill="#0f172a"/>
      <rect x="230" y="170" width="60" height="60" rx="4" fill="url(#g2)" opacity=".4"/>
      <rect x="300" y="180" width="60" height="40" rx="4" fill="#475569"/>
      <text x="220" y="160" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">2024-09-12 · 19:15</text>
      <rect x="20" y="270" width="170" height="110" rx="10" fill="#0f172a"/>
      <rect x="40" y="300" width="60" height="60" rx="4" fill="url(#g2)" opacity=".7"/>
      <rect x="110" y="310" width="60" height="40" rx="4" fill="#475569"/>
      <text x="30" y="290" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">2024-09-13 · 06:08</text>
      <rect x="210" y="270" width="170" height="110" rx="10" fill="#0f172a"/>
      <rect x="230" y="300" width="60" height="60" rx="4" fill="url(#g2)" opacity=".5"/>
      <rect x="300" y="310" width="60" height="40" rx="4" fill="#475569"/>
      <text x="220" y="290" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">2024-09-13 · 07:31</text>
    </g>
  </symbol>

  <symbol id="art-chat" viewBox="0 0 400 400">
    <defs><linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00b8a9"/><stop offset="100%" stop-color="#00d4c3"/></linearGradient></defs>
    <rect x="20" y="40" width="360" height="320" rx="14" fill="#fff" stroke="#e5e7eb"/>
    <!-- user msg -->
    <g>
      <rect x="120" y="70" width="240" height="44" rx="10" fill="#0f172a"/>
      <text x="135" y="88" fill="#fff" font-family="Inter,sans-serif" font-size="12">How many vehicles entered Gate 3</text>
      <text x="135" y="104" fill="#fff" font-family="Inter,sans-serif" font-size="12">between 8 and 9 AM today?</text>
    </g>
    <!-- AI response -->
    <g>
      <circle cx="50" cy="150" r="14" fill="url(#g3)"/>
      <path d="M44 150l4 4 8-8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <rect x="74" y="134" width="280" height="92" rx="10" fill="#f0fdfa" stroke="#a7f3d0"/>
      <text x="86" y="154" fill="#0f172a" font-family="Inter,sans-serif" font-size="12" font-weight="600">47 vehicles entered Gate 3.</text>
      <text x="86" y="172" fill="#475569" font-family="Inter,sans-serif" font-size="11">Peak: 8:22 AM (12 vehicles in 6 min)</text>
      <rect x="86" y="184" width="80" height="32" rx="4" fill="#0f172a"/>
      <rect x="170" y="184" width="80" height="32" rx="4" fill="#0f172a"/>
      <text x="92" y="206" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">► clip 1</text>
      <text x="176" y="206" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">► clip 2</text>
    </g>
    <!-- typing -->
    <g>
      <circle cx="50" cy="270" r="14" fill="url(#g3)" opacity=".3"/>
      <rect x="74" y="256" width="120" height="28" rx="10" fill="#f9fafb"/>
      <circle cx="100" cy="270" r="3" fill="#9ca3af"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="115" cy="270" r="3" fill="#9ca3af"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="130" cy="270" r="3" fill="#9ca3af"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>
    <rect x="40" y="310" width="320" height="36" rx="18" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="56" y="332" fill="#9ca3af" font-family="Inter,sans-serif" font-size="12">Ask anything about your data…</text>
  </symbol>

  <symbol id="art-face" viewBox="0 0 400 400">
    <defs><linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00b8a9"/><stop offset="100%" stop-color="#00d4c3"/></linearGradient></defs>
    <rect x="40" y="40" width="320" height="320" rx="16" fill="#0f172a"/>
    <!-- face silhouette -->
    <g transform="translate(200 200)">
      <circle r="80" fill="#1e293b"/>
      <circle r="70" fill="none" stroke="url(#g4)" stroke-width="1.5" stroke-dasharray="4 4">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      </circle>
      <ellipse cx="-22" cy="-12" rx="6" ry="3" fill="#cbd5e1"/>
      <ellipse cx="22" cy="-12" rx="6" ry="3" fill="#cbd5e1"/>
      <path d="M-18 22q18 12 36 0" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- landmarks -->
      <g fill="#00b8a9">
        <circle cx="-22" cy="-12" r="1.5"/><circle cx="22" cy="-12" r="1.5"/>
        <circle cx="0" cy="6" r="1.5"/><circle cx="-18" cy="22" r="1.5"/><circle cx="18" cy="22" r="1.5"/>
        <circle cx="-40" cy="-30" r="1.5"/><circle cx="40" cy="-30" r="1.5"/>
        <circle cx="-50" cy="10" r="1.5"/><circle cx="50" cy="10" r="1.5"/>
        <circle cx="-30" cy="40" r="1.5"/><circle cx="30" cy="40" r="1.5"/>
      </g>
    </g>
