    <circle cx="84" cy="318" r="4" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>
    <text x="100" y="312" fill="#fff" font-family="Inter,sans-serif" font-size="12" font-weight="600">Match · ID 8423</text>
    <text x="100" y="328" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Authorised · access granted · 99.6%</text>
  </symbol>

