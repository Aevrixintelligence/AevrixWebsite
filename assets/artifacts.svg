      <rect x="140" y="240" width="60" height="60" fill="#ef4444"/>
      <rect x="200" y="240" width="60" height="60" fill="#facc15"/>
      <rect x="260" y="240" width="60" height="60" fill="#22c55e"/>
    </g>
    <rect x="140" y="240" width="60" height="60" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 3"/>
